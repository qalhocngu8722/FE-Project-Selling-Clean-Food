<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục - FreshQAL Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">

</head>
<body>
    <div class="admin-layout" id="app">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div class="topbar">
                <h2><i class="fa-solid fa-folder"></i> Quản lý danh mục</h2>
                <div class="topbar-actions">
                    <button class="btn btn-primary btn-sm" onclick="openAddCategory()"><i class="fa-solid fa-plus"></i> Thêm danh mục</button>
                </div>
            </div>

            <div class="data-card">
                <div class="data-card-header">
                    <h3>Danh sách danh mục</h3>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên danh mục</th>
                            <th>Mô tả</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="categoryModal">
        <div class="modal" style="max-width:500px;">
            <div class="modal-header">
                <h3 id="modalTitle">Thêm danh mục</h3>
                <button class="modal-close" onclick="closeModal('categoryModal')">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Tên danh mục</label>
                    <input type="text" class="form-control" id="fName" placeholder="Nhập tên danh mục">
                </div>
                <div class="form-group">
                    <label>Mô tả</label>
                    <textarea class="form-control" id="fDesc" rows="3" placeholder="Mô tả danh mục"></textarea>
                </div>
                <div class="form-group">
                    <label>Icon (Emoji)</label>
                    <select class="form-control" id="fIcon">
                        <option value="🥬">🥬 Rau lá</option>
                        <option value="🥕">🥕 Củ quả</option>
                        <option value="🍎">🍎 Trái cây</option>
                        <option value="🍄">🍄 Nấm</option>
                        <option value="🌿">🌿 Rau gia vị</option>
                        <option value="🥦">🥦 Bông cải</option>
                        <option value="🌽">🌽 Ngô</option>
                        <option value="🥒">🥒 Dưa leo</option>
                        <option value="🍅">🍅 Cà chua</option>
                        <option value="🫑">🫑 Ớt chuông</option>
                        <option value="🧄">🧄 Tỏi</option>
                        <option value="🥜">🥜 Đậu</option>
                        <option value="🫘">🫘 Hạt</option>
                        <option value="🥑">🥑 Bơ</option>
                        <option value="🍋">🍋 Chanh</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('categoryModal')">Hủy</button>
                <button class="btn btn-primary" onclick="saveCategory()">Lưu danh mục</button>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
    (async function initPage() {
        const user = requireRole(['staff', 'admin']);
        if (!user) return;
        await preloadData();
        document.getElementById('sidebarContainer').innerHTML = renderSidebar('staff', 'categories');
        renderCategories();
    })();

    function renderCategories() {
        const categories = getCategories();
        const products = getProducts();
        document.getElementById('categoryTableBody').innerHTML = categories.length
            ? categories.map(c => {
                const productCount = products.filter(p => p.category_id === c.id).length;
                return `<tr>
                    <td><strong>${c.id}</strong></td>
                    <td style="font-size:1.8rem;">${c.icon}</td>
                    <td><strong>${c.name}</strong></td>
                    <td style="color:var(--text-secondary);">${c.description}</td>
                    <td><span style="background:var(--primary-bg);color:var(--primary);padding:4px 12px;border-radius:20px;font-weight:700;font-size:0.85rem;">${productCount} sản phẩm</span></td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-edit" onclick="editCategory(${c.id})" title="Sửa"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-delete" onclick="deleteCategory(${c.id})" title="Xóa"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="6" class="text-center text-muted" style="padding:40px">Chưa có danh mục nào</td></tr>';
    }

    function openAddCategory() {
        document.getElementById('modalTitle').textContent = 'Thêm danh mục mới';
        document.getElementById('editId').value = '';
        document.getElementById('fName').value = '';
        document.getElementById('fDesc').value = '';
        document.getElementById('fIcon').value = '🥬';
        openModal('categoryModal');
    }

    function editCategory(id) {
        const c = getCategoryById(id);
        if (!c) return;
        document.getElementById('modalTitle').textContent = 'Sửa danh mục';
        document.getElementById('editId').value = c.id;
        document.getElementById('fName').value = c.name;
        document.getElementById('fDesc').value = c.description;
        document.getElementById('fIcon').value = c.icon;
        openModal('categoryModal');
    }

    function saveCategory() {
        const name = document.getElementById('fName').value.trim();
        if (!name) { showToast('Vui lòng nhập tên danh mục!', 'error'); return; }

        const categories = getCategories();
        const editId = document.getElementById('editId').value;
        const catData = {
            name: name,
            description: document.getElementById('fDesc').value.trim(),
            icon: document.getElementById('fIcon').value
        };

        if (editId) {
            const idx = categories.findIndex(c => c.id === parseInt(editId));
            if (idx !== -1) {
                categories[idx] = { ...categories[idx], ...catData };
                setCategories(categories);
                showToast('Cập nhật danh mục thành công!');
            }
        } else {
            const maxId = categories.length ? Math.max(...categories.map(c => c.id)) : 0;
            catData.id = maxId + 1;
            categories.push(catData);
            setCategories(categories);
            showToast('Thêm danh mục mới thành công!');
        }

        closeModal('categoryModal');
        renderCategories();
    }

    function deleteCategory(id) {
        const c = getCategoryById(id);
        if (!c) return;
        const productCount = getProducts().filter(p => p.category_id === id).length;
        if (productCount > 0) {
            showToast(`Không thể xóa! Danh mục "${c.name}" đang có ${productCount} sản phẩm.`, 'error');
            return;
        }
        if (!confirm(`Bạn có chắc muốn xóa danh mục "${c.name}"?`)) return;
        const categories = getCategories().filter(cat => cat.id !== id);
        setCategories(categories);
        showToast('Đã xóa danh mục!', 'info');
        renderCategories();
    }
    </script>
</body>
</html>

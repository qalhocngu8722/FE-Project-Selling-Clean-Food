<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - FreshQAL Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">
</head>
<body>
    <div class="admin-layout" id="app">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div class="topbar">
                <h2><span style="color: #6a1b9a; background-color: #f3e5f5; padding: 6px 10px; border-radius: 6px; display: inline-flex; align-items: center; margin-right: 8px;"><i class="fa-solid fa-users"></i></span> Quản lý người dùng</h2>
                <div class="topbar-actions">
                    <button class="btn btn-primary btn-sm" onclick="openAddUser()"><i class="fa-solid fa-plus"></i> Thêm người dùng</button>
                </div>
            </div>

            <div class="data-card">
                <div class="data-card-header">
                    <h3>Danh sách người dùng</h3>
                    <div class="data-card-tools">
                        <input type="text" class="search-input" id="searchInput" placeholder=" Tìm kiếm người dùng..." oninput="renderUsers()">
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="userModal">
        <div class="modal" style="max-width:500px;">
            <div class="modal-header">
                <h3 id="modalTitle">Thêm người dùng</h3>
                <button class="modal-close" onclick="closeModal('userModal')">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text" class="form-control" id="fName" placeholder="Nhập họ tên">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" id="fEmail" placeholder="Nhập email">
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Mật khẩu</label>
                    <input type="password" class="form-control" id="fPassword" placeholder="Nhập mật khẩu">
                </div>
                <div class="form-group">
                    <label>Vai trò</label>
                    <select class="form-control" id="fRole"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('userModal')">Hủy</button>
                <button class="btn btn-primary" onclick="saveUser()">Lưu người dùng</button>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
    const currentUser = requireRole(['staff', 'admin']);
    (async function initPage() {
        if (currentUser) {
            let qal = localStorage.getItem("id_current_user");
            let qal1 =  await getUserById(qal);
            document.getElementById('sidebarContainer').innerHTML = renderSidebar(qal1.role, 'users');
            renderUsers();
        }
    })();

    function getRoleLabel(role) {
        const map = { admin: 'Quản trị viên', staff: 'Nhân viên', user: 'Khách hàng' };
        return map[role] || role;
    }

    function getRoleStyle(role) {
        const styles = {
            admin: 'background:var(--danger-bg);color:var(--danger);',
            staff: 'background:var(--info-bg);color:var(--info);',
            user: 'background:var(--primary-bg);color:var(--primary);'
        };
        return styles[role] || '';
    }

    async function getManageableUsers() {
        const users = await getUsers();
        if (currentUser.role === 'admin') return users;
        return users.filter(u => u.role !== 'admin');
    }

    async function renderUsers() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        let users = await getManageableUsers();
        if (keyword) {
            users = users.filter(u =>
                u.name.toLowerCase().includes(keyword) ||
                u.email.toLowerCase().includes(keyword)
            );
        }

        document.getElementById('userTableBody').innerHTML = users.length
            ? users.map(u => {
                const canEdit = currentUser.role === 'admin' || u.role !== 'admin';
                return `<tr>
                    <td><strong>${u.id}</strong></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:0.85rem;">${u.name.charAt(0).toUpperCase()}</div>
                            <strong>${u.name}</strong>
                        </div>
                    </td>
                    <td>${u.email}</td>
                    <td><span style="padding:4px 12px;border-radius:20px;font-size:0.82rem;font-weight:700;${getRoleStyle(u.role)}">${getRoleLabel(u.role)}</span></td>
                    <td>${u.created_at ? formatDate(u.created_at) : 'N/A'}</td>
                    <td>
                        ${canEdit ? `<div class="table-actions">
                            <button class="btn-edit" onclick="editUser(${u.id})" title="Sửa"><i class="fa-solid fa-pen"></i></button>
                            ${u.id !== currentUser.id ? `<button class="btn-delete" onclick="apiDeleteUser(${u.id})" title="Xóa"><i class="fa-solid fa-trash"></i></button>` : ''}
                        </div>` : '<span style="font-size:0.82rem;color:var(--text-light);">—</span>'}
                    </td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="6" class="text-center text-muted" style="padding:40px">Không tìm thấy người dùng</td></tr>';
    }

    function loadRoleOptions(isEdit) {
        const sel = document.getElementById('fRole');
        if (currentUser.role === 'admin') {
            sel.innerHTML = `
                <option value="user">Khách hàng</option>
                <option value="staff">Nhân viên</option>
                <option value="admin">Quản trị viên</option>
            `;
        } else {
            sel.innerHTML = `
                <option value="user">Khách hàng</option>
                <option value="staff">Nhân viên</option>
            `;
        }
    }

    function openAddUser() {
        document.getElementById('modalTitle').textContent = 'Thêm người dùng mới';
        document.getElementById('editId').value = '';
        document.getElementById('fName').value = '';
        document.getElementById('fEmail').value = '';
        document.getElementById('fPassword').value = '';
        document.getElementById('passwordGroup').style.display = '';
        document.getElementById('fPassword').setAttribute('required', '');
        loadRoleOptions(false);
        document.getElementById('fRole').value = 'user';
        openModal('userModal');
    }

    function editUser(id) {
        if(id == 1) {
            showToast('Không thể chỉnh sửa tài khoản admin tổng của hệ thống!', 'error');
            return;
        }
        // Nếu gọi từ onclick="editUser(id)", lấy tr từ btn-edit
        let tr = null;
        // Tìm phần tử đang active (btn-edit) qua event hoặc fallback theo id
        if (window.event && window.event.target) {
            let btn = window.event.target;
            // Nếu click vào icon bên trong button
            if (btn.tagName === 'I' && btn.parentElement.classList.contains('btn-edit')) {
                btn = btn.parentElement;
            }
            if (btn.classList.contains('btn-edit')) {
                tr = btn.closest('tr');
            }
        }
        // Nếu không tìm được tr, fallback lấy theo id (cũ)
        let values = {};
        if (tr) {
            // Lấy các cột theo thứ tự: ID, Họ tên, Email, Vai trò, Ngày tạo
            const tds = tr.querySelectorAll('td');
            values.id = tds[0].innerText.trim();
            // Họ tên nằm trong strong ở td[1]
            values.name = tds[1].querySelector('strong').innerText.trim();
            values.email = tds[2].innerText.trim();
            // Vai trò lấy value từ text trong span
            const roleText = tds[3].querySelector('span').innerText.trim();
            // Map lại roleText về value
            const roleMap = { 'Quản trị viên': 'admin', 'Nhân viên': 'staff', 'Khách hàng': 'user' };
            values.role = roleMap[roleText] || 'user';
            values.created_at = tds[4].innerText.trim();
        } else {
            // Fallback: lấy từ getUserById như cũ
            const u = getUserById(id);
            if (!u) return;
            if (currentUser.role !== 'admin' && u.role === 'admin') {
                showToast('Bạn không có quyền chỉnh sửa tài khoản admin!', 'error');
                return;
            }
            values = { id: u.id, name: u.name, email: u.email, role: u.role, created_at: u.created_at };
        }
        // Check quyền
        if (currentUser.role !== 'admin' && values.role === 'admin') {
            showToast('Bạn không có quyền chỉnh sửa tài khoản admin!', 'error');
            return;
        }
        // Fill form
        document.getElementById('modalTitle').textContent = 'Sửa người dùng';
        document.getElementById('editId').value = values.id;
        document.getElementById('fName').value = values.name;
        document.getElementById('fEmail').value = values.email;
        document.getElementById('fPassword').value = '';
        document.getElementById('fPassword').removeAttribute('required');
        document.getElementById('passwordGroup').querySelector('label').textContent = 'Mật khẩu (để trống nếu không đổi)';
        loadRoleOptions(true);
        document.getElementById('fRole').value = values.role;
        openModal('userModal');
    }

    async function saveUser() {
        const name = document.getElementById('fName').value.trim();
        const email = document.getElementById('fEmail').value.trim();
        const password = document.getElementById('fPassword').value;
        const role = document.getElementById('fRole').value;
        const editId = document.getElementById('editId').value;

        if (!name) { showToast('Vui lòng nhập họ tên!', 'error'); return; }
        if (!email) { showToast('Vui lòng nhập email!', 'error'); return; }
        if (!editId && !password) { showToast('Vui lòng nhập mật khẩu!', 'error'); return; }

        const users = await getUsers();

        const duplicate = users.find(u => u.email === email && String(u.id) !== editId);
        if (duplicate) { showToast('Email đã tồn tại!', 'error'); return; }

        if (editId) {
            const idx = users.findIndex(u => u.id === parseInt(editId));
            if (idx !== -1) {
                users[idx].name = name;
                users[idx].email = email;
                users[idx].role = role;
                if (password) users[idx].password = password;
                await apiUpdateUser(users[idx].id, users[idx]);
                showToast('Cập nhật người dùng thành công!');
            }
        } else {
            const newId = getNextUserId();
            users.push({
                id: newId,
                name: name,
                email: email,
                password: password,
                role: role,
                created_at: new Date().toISOString().split('T')[0]
            });
            await apiAddUser(users[users.length - 1]);
            showToast('Thêm người dùng mới thành công!');
        }

        closeModal('userModal');
        document.getElementById('passwordGroup').querySelector('label').textContent = 'Mật khẩu';
        renderUsers();
    }
    async function apiAddUser(user) {
        const res = await fetch('https://localhost:7128/api/Users/Users/Addnew', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user)
        });
        if (!res.ok) throw new Error(await res.text());
        return await res.text();
    }
    async function apiUpdateUser(id, user) {
        console.log(JSON.stringify(user));
        const res = await fetch(`https://localhost:7128/api/Users/Users/UpdateUser?id=${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user)
        });
        if (!res.ok) throw new Error(await res.text());
        return await res.text();
    }
    async function apiDeleteUser(id) {
        let user_dlt = await getUserById(id);
        if(getCurrentUser().id === id) {
            showToast('Không thể xóa chính mình!', 'error');
            return;
        }
        if (getCurrentUser().role !== 'admin' && user_dlt.role === 'admin') {
            showToast('Bạn không có quyền xóa tài khoản admin!', 'error');
            return;
        }
        if (!confirm(`Bạn có chắc muốn xóa người dùng "${user_dlt.name}"?`)) return;

        const res = await fetch(`https://localhost:7128/api/Users/Users/DeleteUser?id=${id}`, {
            method: 'DELETE'
        });
        if (!res.ok) throw new Error(await res.text());
        showToast('Đã xóa người dùng!', 'success');

        const tableBody = document.getElementById('userTableBody');
        if (tableBody) {
            const trs = tableBody.querySelectorAll('tr');
            for (const tr of trs) {
                const td = tr.querySelector('td');
                if (td && td.textContent.trim() === String(id)) {
                    tr.remove();
                    break;
                }
            }
        }

        return await res.json();
    }
    </script>
</body>
</html>

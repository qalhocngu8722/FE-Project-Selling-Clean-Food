<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FreshQAL Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">

</head>
<body>
    <div class="admin-layout" id="app">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div class="topbar">
                <h2><span style="color: #f57c00; background-color: #bbfcf8; padding: 6px 10px; border-radius: 6px; display: inline-flex; align-items: center; margin-right: 8px;">📊</span> Dashboard</h2>
                <div class="topbar-actions">
                    <span id="userGreeting"></span>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="data-card current-orders">
                    <div class="data-card-header">
                        <h3>📦  Đơn hàng gần đây</h3>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Mã ĐH</th>
                                <th>Khách hàng</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrders"></tbody>
                    </table>
                </div>

                <div class="data-card top-products-selling">
                    <div class="data-card-header">
                        <h3></h3>
                    </div>
                    <div id="topProducts" style="padding:16px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
    (async function initPage() {
        const user = requireRole(['staff', 'admin']);
        if (!user) return;
        await preloadData();
        let qal = localStorage.getItem("id_current_user");
        let qal1 =  await getUserById(qal);
        document.getElementById('sidebarContainer').innerHTML = renderSidebar(qal1.role, 'dashboard');
        document.getElementById('userGreeting').innerHTML = `👋 Xin chào, <strong>${user.name}</strong>`;

        const products = await _fetchProductsFromAPI();
        const orders = await getOrders();
        const users = await getUsers();
        const totalRevenue = orders
            .filter(o => o.order_status === 'resolve')
            .reduce((sum, o) => sum + o.total_amount, 0);

        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card green">
                <div class="stat-icon"><i class="fa-solid fa-carrot"></i></div>
                <div class="stat-info">
                    <h4>Tổng sản phẩm</h4>
                    <div class="stat-number">${products.length}</div>
                </div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                <div class="stat-info">
                    <h4>Tổng đơn hàng</h4>
                    <div class="stat-number">${orders.length}</div>
                </div>
            </div>
            <div class="stat-card blue">
                <div class="stat-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                <div class="stat-info">
                    <h4>Doanh thu</h4>
                    <div class="stat-number">${formatPrice(totalRevenue)}</div>
                </div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <h4>Người dùng</h4>
                    <div class="stat-number">${users.length}</div>
                </div>
            </div>
        `;

        const recentOrders = [...orders].sort((a, b) => new Date(b.order_date) - new Date(a.order_date)).slice(0, 5);
        document.getElementById('recentOrders').innerHTML = recentOrders.length
            ? recentOrders.map(o => {
                return `<tr>
                    <td><strong>#${o.id}</strong></td>
                    <td>${o.recipient_name}</td>
                    <td class="text-accent fw-bold">${formatPrice(o.total_amount)}</td>
                    <td><span class="order-status status-${o.order_status}">${getOrderStatusText(o.order_status)}</span></td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="4" class="text-center text-muted" style="padding:30px">Chưa có đơn hàng</td></tr>';

        // Lấy danh sách sản phẩm bán chạy từ API (Server đã tính toán)
        const topProducts = await GetListProductSellWell();
        
        if (topProducts.length > 0) {
            const productHtmlArr = topProducts.map((product, idx) => {
                return `<div style="display:flex;align-items:center;gap:14px;padding:12px 0;${idx < topProducts.length - 1 ? 'border-bottom:1px dashed var(--border);' : ''}">
                    <img style="width:44px;height:44px;background:var(--primary-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;" src="https://localhost:7128${product.image_url}" alt="${product.name}">
                    <div style="flex:1;">
                        <div style="font-weight:600;">${product.name}</div>
                    </div>
                </div>`;
            });
            document.getElementById('topProducts').innerHTML = productHtmlArr.join('');
        } else {
            document.getElementById('topProducts').innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-chart-bar"></i></div><p>Chưa có dữ liệu bán hàng</p></div>';
        }
    })();
    async function GetListProductSellWell(){
        const api = `https://localhost:7128/api/SanPham/Render_Product_sellwell_Dashbroads`;
        let list1 = await fetch(api);
        if(!list1.ok){
            showToast('Không thể tải dữ liệu sản phẩm bán chạy!', 'error');
            return [];
        }
        let list2 = await list1.json();
        if(list2.length > 0){
            return list2;
        }
        return [];
    }
    document.querySelector(".top-products-selling h3").innerHTML = `🏆 Sản phẩm bán chạy trong tháng ${new Date().getMonth() + 1}`;
    </script>
</body>
</html>

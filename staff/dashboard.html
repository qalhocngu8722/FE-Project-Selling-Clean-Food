<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FreshQAL Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">

</head>
<body>
    <div class="admin-layout" id="app">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div class="topbar">
                <h2>📊 Dashboard</h2>
                <div class="topbar-actions">
                    <span id="userGreeting"></span>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="data-card current-orders">
                    <div class="data-card-header">
                        <h3>📦  Đơn hàng gần đây</h3>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Mã ĐH</th>
                                <th>Khách hàng</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrders"></tbody>
                    </table>
                </div>

                <div class="data-card top-products-selling">
                    <div class="data-card-header">
                        <h3></h3>
                    </div>
                    <div id="topProducts" style="padding:16px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
    (async function initPage() {
        const user = requireRole(['staff', 'admin']);
        if (!user) return;
        await preloadData();

        document.getElementById('sidebarContainer').innerHTML = renderSidebar('staff', 'dashboard');
        document.getElementById('userGreeting').innerHTML = `👋 Xin chào, <strong>${user.name}</strong>`;

        const products = getProducts();
        const orders = getOrders();
        const users = getUsers();
        const totalRevenue = orders
            .filter(o => o.order_status === 'resolve')
            .reduce((sum, o) => sum + o.total_amount, 0);

        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card green">
                <div class="stat-icon"><i class="fa-solid fa-carrot"></i></div>
                <div class="stat-info">
                    <h4>Tổng sản phẩm</h4>
                    <div class="stat-number">${products.length}</div>
                </div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                <div class="stat-info">
                    <h4>Tổng đơn hàng</h4>
                    <div class="stat-number">${orders.length}</div>
                </div>
            </div>
            <div class="stat-card blue">
                <div class="stat-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                <div class="stat-info">
                    <h4>Doanh thu</h4>
                    <div class="stat-number">${formatPrice(totalRevenue)}</div>
                </div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <h4>Người dùng</h4>
                    <div class="stat-number">${users.length}</div>
                </div>
            </div>
        `;

        const recentOrders = [...orders].sort((a, b) => new Date(b.order_date) - new Date(a.order_date)).slice(0, 5);
        document.getElementById('recentOrders').innerHTML = recentOrders.length
            ? recentOrders.map(o => {
                const customer = getUserById(o.user_id);
                return `<tr>
                    <td><strong>#${o.id}</strong></td>
                    <td>${customer ? customer.name : 'N/A'}</td>
                    <td class="text-accent fw-bold">${formatPrice(o.total_amount)}</td>
                    <td><span class="order-status status-${o.order_status}">${getOrderStatusText(o.order_status)}</span></td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="4" class="text-center text-muted" style="padding:30px">Chưa có đơn hàng</td></tr>';

        const productSales = {};
        orders.forEach(o => {
            o.items.forEach(item => {
                productSales[item.product_id] = (productSales[item.product_id] || 0) + item.quantity;
            });
        });
        const topProducts = Object.entries(productSales)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        document.getElementById('topProducts').innerHTML = topProducts.length
            ? topProducts.map((entry, idx) => {
                const p = getProductById(parseInt(entry[0]));
                if (!p) return '';
                return `<div style="display:flex;align-items:center;gap:14px;padding:12px 0;${idx < topProducts.length - 1 ? 'border-bottom:1px dashed var(--border);' : ''}">
                    <div style="width:44px;height:44px;background:var(--primary-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">${p.emoji}</div>
                    <div style="flex:1;">
                        <div style="font-weight:600;">${p.name}</div>
                        <div style="font-size:0.82rem;color:var(--text-light);">Đã bán: ${entry[1]} ${p.unit}</div>
                    </div>
                    <div style="font-weight:700;color:var(--accent);">${formatPrice(p.price)}</div>
                </div>`;
            }).join('')
            : '<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-chart-bar"></i></div><p>Chưa có dữ liệu bán hàng</p></div>';
    })();

    document.querySelector(".top-products-selling h3").innerHTML = `🏆 Sản phẩm bán chạy trong tháng ${new Date().getMonth() + 1}`;
    </script>
</body>
</html>

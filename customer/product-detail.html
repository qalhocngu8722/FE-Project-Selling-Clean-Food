<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - FreshQAL</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="product-detail animate-fadeIn">
        <div class="breadcrumb" id="breadcrumb">
            <a href="../index.html"><i class="fa-solid fa-house"></i> Trang chủ</a>
            <span class="separator"><i class="fa-solid fa-chevron-right"></i></span>
            <a href="../index.html#products"><i class="fa-solid fa-box"></i> Sản phẩm</a>
            <span class="separator"><i class="fa-solid fa-chevron-right"></i></span>
            <span class="current" id="breadcrumb-name">...</span>
        </div>

        <div class="product-detail-grid" id="product-detail-grid">
            <div class="pd-gallery animate-fadeInLeft">
                <div class="pd-main-image" id="pd-main-image"></div>
                <div class="pd-thumbnails" id="pd-thumbnails"></div>
            </div>

            <div class="pd-info animate-fadeInRight">
                <h1 id="pd-name"></h1>
                <div class="list-category">
                    
                </div>
                <div class="pd-price" id="pd-price"></div>

                <div class="pd-specs" id="pd-specs"></div>

                <div class="pd-description" id="pd-description">
                    <h3><i class="fa-solid fa-note"></i> Mô tả sản phẩm</h3>
                    <p id="pd-desc-text"></p>
                </div>

                <div class="pd-quantity">
                    <span style="font-weight:600;">Số lượng:</span>
                    <div class="qty-control">
                        <button onclick="changeQty(-1)"><i class="fa-solid fa-minus"></i></button>
                        <input type="number" id="qty-input" value="1" min="1" onchange="validateQty()">
                        <button onclick="changeQty(1)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <span class="qty-stock" id="qty-stock"></span>
                </div>

                <div class="pd-buttons">
                    <button class="btn btn-primary btn-lg" onclick="handleAddToCart()">
                        <i class="fa-solid fa-cart-shopping"></i> Thêm vào giỏ hàng
                    </button>
                    <button class="btn btn-accent btn-lg" onclick="handleBuyNow()">
                        <i class="fa-solid fa-bolt"></i> Mua ngay
                    </button>
                </div>
            </div>
        </div>

        <div class="section reveal" id="related-section" style="padding-top:60px;">
            <div class="section-header">
                <h2>Sản phẩm liên quan</h2>
                <p>Những sản phẩm cùng danh mục bạn có thể thích</p>
                <div class="section-line"></div>
            </div>
            <div class="product-grid" id="related-products"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let currentProduct = null;
        let relatedProducts = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const productId = localStorage.getItem('selected_detail_product_id');
            console.log('Product ID from URL:', productId);
            if (!productId) {
                navigateTo('home');
                return;
            }
            try {
                const res = await fetch(`https://localhost:7128/api/SanPham/Get_Detail_Product_With_Related?id=${productId}`);
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                currentProduct = data;
                relatedProducts = Array.isArray(data.related_products) ? data.related_products : [];
            } catch (e) {
                showToast('Không thể tải dữ liệu sản phẩm!', 'error');
                // navigateTo('home');
                return;
            }

            document.getElementById('header-placeholder').innerHTML = renderCustomerHeader();
            document.getElementById('footer-placeholder').innerHTML = renderFooter();

            renderProductDetail();
            renderRelatedProducts();
        });

        function renderProductDetail() {
            const p = currentProduct;
            document.title = `${p.name} - FreshQAL`;
            document.getElementById('breadcrumb-name').textContent = p.name;
            document.getElementById('pd-name').textContent = p.name;
            // Hiển thị category_name nếu có
            let categoryNames = p.category_name ? `<span class="pd-category">${p.category_name}</span>` : '';
            document.querySelector('.list-category').innerHTML = categoryNames;
            document.getElementById('pd-price').innerHTML = `${formatPrice(p.price)} <small>/ ${p.unit}</small>`;

            // Xử lý hình ảnh
            const images = Array.isArray(p.image_url) ? p.image_url : [];
            let mainImg = images.find(img => img.is_primary) || images[0];
            let mainImgUrl = mainImg ? mainImg.image_url : '';
            document.getElementById('pd-main-image').innerHTML = mainImgUrl ? `<img src="https://localhost:7128${mainImgUrl}" alt="${p.name}" style="max-width:100%;object-fit:contain;" />` : '<span>🥬</span>';

            // Thumbnails
            document.getElementById('pd-thumbnails').innerHTML = images.map((img, i) => `
                <div class="pd-thumb ${img.is_primary ? 'active' : ''}" onclick="changeMainImage('https://localhost:7128${img.image_url}', this)">
                    <img src="https://localhost:7128${img.image_url}" alt="thumb" style="width:48px;height:48px;object-fit:contain;border-radius:8px;" />
                </div>
            `).join('');

            const specs = [
                { icon: '📍', label: 'Xuất xứ', value: p.origin },
                { icon: '🌿', label: 'Loại', value: p.food_type },
                { icon: '📏', label: 'Kích Thước Trung Bình', value: p.size },
                { icon: '📅', label: 'HSD', value: formatDate(p.hsd) },
                { icon: '❄️', label: 'Bảo quản', value: p.storage_instructions },
                { icon: '🍳', label: 'Sử dụng', value: p.usage_instructions }
            ];
            document.getElementById('pd-specs').innerHTML = specs.map(s => `
                <div class="pd-spec">
                    <span class="spec-icon">${s.icon}</span>
                    <div>
                        <div class="spec-label">${s.label}</div>
                        <div class="spec-value">${s.value || '—'}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('pd-desc-text').textContent = p.description;
            document.getElementById('qty-stock').innerHTML = `Còn <strong>${p.quantity}</strong> ${p.unit}`;
            document.getElementById('qty-input').max = p.quantity;
        }

        function changeMainImage(imgUrl, el) {
            document.getElementById('pd-main-image').innerHTML = `<img src="${imgUrl}" alt="main" style="animation:scaleIn 0.3s ease;max-width:100%;object-fit:contain;" />`;
            document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function changeQty(delta) {
            const input = document.getElementById('qty-input');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            if (val > currentProduct.quantity) {
                val = currentProduct.quantity;
                showToast(`Số lượng tối đa: ${currentProduct.quantity}`, 'warning');
            }
            input.value = val;
        }

        function validateQty() {
            const input = document.getElementById('qty-input');
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > currentProduct.quantity) val = currentProduct.quantity;
            input.value = val;
        }

        function handleAddToCart() {
            const current_user = localStorage.getItem('current_user') ? JSON.parse(localStorage.getItem('current_user')) : null;
            const qty = parseInt(document.getElementById('qty-input').value);
            if(current_user){
                addToCart(current_user.cart_id, currentProduct.id, qty);
            }
            else{
                navigateTo('login');
            }
        }

        function handleBuyNow() {
            const current_user = localStorage.getItem('current_user') ? JSON.parse(localStorage.getItem('current_user')) : null;
            const qty = parseInt(document.getElementById('qty-input').value);
            if(current_user){
                addToCart(current_user.cart_id, currentProduct.id, qty);
                navigateTo('checkout');
            }
            else{
                navigateTo('login');
            }
        }

        function renderRelatedProducts() {
            if (!relatedProducts || relatedProducts.length === 0) {
                document.getElementById('related-section').style.display = 'none';
                return;
            }
            document.getElementById('related-products').innerHTML = relatedProducts.map(p => renderProductCard(p)).join('');
        }
    </script>
</body>
</html>

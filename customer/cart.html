<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - FreshQAL</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="cart-page animate-fadeIn">
        <h1 class="page-title">
            <span class="title-icon"><i class="fa-solid fa-cart-shopping"></i></span>
            Giỏ hàng của bạn
        </h1>

        <div id="cart-content"></div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('header-placeholder').innerHTML = renderCustomerHeader();
            document.getElementById('footer-placeholder').innerHTML = renderFooter();
            renderCart();
        });

        async function renderCart() {
            const user = getCurrentUser();
            if (!user) {
                navigateTo('login');
                return;
            }

            document.getElementById('cart-content').innerHTML = `
                <div style="text-align:center;padding:40px;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;color:var(--accent);"></i>
                    <p style="margin-top:12px;color:var(--text-light);">Đang tải giỏ hàng...</p>
                </div>`;

            try {
                const cartItems = await fetchCartFromAPI(user.id);

                if (!cartItems || cartItems.length === 0) {
                    document.getElementById('cart-content').innerHTML = `
                        <div class="cart-empty animate-fadeInUp">
                            <div class="empty-icon"><i class="fa-solid fa-cart-shopping"></i></div>
                            <h3> Giỏ hàng trống</h3>
                            <p>Bạn chưa thêm sản phẩm nào vào giỏ hàng</p>
                            <button class="btn btn-primary" onclick="navigateTo('home')">
                                <i class="fa-solid fa-shopping-bag"></i> Tiếp tục mua sắm
                            </button>
                        </div>`;
                    return;
                }

                let itemsHTML = '';
                let subtotal = 0;

                cartItems.forEach((item, index) => {
                    const itemTotal = item.price * item.quantity;
                    subtotal += itemTotal;

                    itemsHTML += `
                    <div class="cart-item" style="animation-delay:${index * 0.1}s">
                        <div class="cart-item-img"><i class="fa-solid fa-leaf" style="font-size:1.8rem;color:var(--accent);"></i></div>
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <div class="item-price">${formatPrice(item.price)} / ${item.unit}</div>
                            <div style="margin-top:10px;">
                                <span style="font-size:0.95rem;color:var(--text-light);">Số lượng: <strong>${item.quantity}</strong></span>
                            </div>
                        </div>
                        <div class="cart-item-actions" style="height: 100%; justify-content: flex-end;">
                            <div style="font-weight:700;color:var(--accent);font-size:1.1rem;white-space:nowrap;">
                               Tổng : ${formatPrice(itemTotal)}
                            </div>
                        </div>
                    </div>`;
                });

                const shipping = subtotal >= 200000 ? 0 : 30000;
                const total = subtotal + shipping;

                document.getElementById('cart-content').innerHTML = `
                    <div class="cart-layout">
                        <div class="cart-items">${itemsHTML}</div>
                        <div class="cart-summary animate-fadeInRight">
                            <h3><i class="fa-solid fa-receipt"></i> Tổng đơn hàng</h3>
                            <div class="summary-row">
                                <span>Tạm tính (${cartItems.reduce((s, i) => s + i.quantity, 0)} sản phẩm)</span>
                                <span>${formatPrice(subtotal)}</span>
                            </div>
                            <div class="summary-row">
                                <span>Phí vận chuyển</span>
                                <span style="color:${shipping === 0 ? 'var(--success)' : 'var(--text)'}">
                                    ${shipping === 0 ? '<i class="fa-solid fa-gift"></i> Miễn phí' : formatPrice(shipping)}
                                </span>
                            </div>
                            <div class="summary-total">
                                <span>Tổng cộng</span>
                                <span class="total-amount">${formatPrice(total)}</span>
                            </div>
                            <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:16px;"
                                    onclick="navigateTo('checkout')">
                                <i class="fa-solid fa-money-bill-wave"></i> Tiến hành thanh toán
                            </button>
                            <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px;"
                                    onclick="navigateTo('home')">
                                <i class="fa-solid fa-arrow-left"></i> Tiếp tục mua sắm
                            </button>
                        </div>
                    </div>`;
            } catch (err) {
                console.error('Lỗi tải giỏ hàng:', err);
                document.getElementById('cart-content').innerHTML = `
                    <div class="cart-empty animate-fadeInUp">
                        <div class="empty-icon"><i class="fa-solid fa-exclamation-triangle" style="color:var(--danger);"></i></div>
                        <h3>Không thể tải giỏ hàng</h3>
                        <p>Đã xảy ra lỗi khi tải dữ liệu. Vui lòng thử lại.</p>
                        <button class="btn btn-primary" onclick="renderCart()">
                            <i class="fa-solid fa-rotate-right"></i> Thử lại
                        </button>
                    </div>`;
            }
        }
    </script>
</body>
</html>

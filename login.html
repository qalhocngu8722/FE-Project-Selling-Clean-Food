<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | FreshQAL - Rau Củ Quả Tươi Sạch</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="./fontawesome-free-6.6.0-web/css/all.css">
</head>
<body>

<div class="auth-page" id="authPage">
    <div class="floating-veggies" id="floatingVeggies"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
                <h2>FreshQAL</h2>
                <p>Đăng nhập để mua sắm</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Đăng nhập</button>
                <button class="auth-tab" onclick="switchTab('register')">Đăng ký</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-input-wrapper">
                    <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="loginEmail" placeholder="Địa chỉ email" required>
                </div>
                <div class="form-input-wrapper">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
                </div>
                <label class="form-checkbox">
                    <input type="checkbox" id="rememberMe">
                    Ghi nhớ đăng nhập
                </label>
                <button type="submit" class="auth-btn">Đăng nhập</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-input-wrapper">
                    <span class="input-icon"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="regName" placeholder="Họ và tên" required>
                </div>
                <div class="form-input-wrapper">
                    <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="regEmail" placeholder="Địa chỉ email" required>
                </div>
                <div class="form-input-wrapper">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="regPassword" placeholder="Mật khẩu" required>
                </div>
                <div class="form-input-wrapper">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" required>
                </div>
                <button type="submit" class="auth-btn">Đăng ký</button>
            </form>

            <div style="text-align:center; margin-top:24px;">
                <a href="index.html" style="color:var(--text-secondary); font-size:0.9rem;">
                <i class="fa-solid fa-arrow-left"></i> Về trang chủ
                </a>
            </div>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/components.js"></script>
<script>
    /* ── Tab switching ── */
    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => {
            f.classList.remove('active');
            f.style.animation = '';
        });

        if (tab === 'login') {
            document.querySelector('.auth-tab:first-child').classList.add('active');
            const form = document.getElementById('loginForm');
            form.classList.add('active');
            form.style.animation = 'fadeInUp 0.4s ease';
        } else {
            document.querySelector('.auth-tab:last-child').classList.add('active');
            const form = document.getElementById('registerForm');
            form.classList.add('active');
            form.style.animation = 'fadeInUp 0.4s ease';
        }
    }

    /* ── Login ── */
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showToast('Vui lòng nhập đầy đủ thông tin!', 'warning');
            return;
        }

        const btn = document.querySelector('#loginForm .auth-btn');
        btn.disabled = true;
        btn.textContent = 'Đang đăng nhập...';

        try {
            const user = await loginAPI(email, password);
            setCurrentUser(user);
            showToast(`Chào mừng ${user.name}! Đang chuyển hướng...`, 'success');

            setTimeout(() => {
                switch (user.role) {
                    case 'admin': window.location.href = 'admin/dashboard.html'; break;
                    case 'staff': window.location.href = 'staff/dashboard.html'; break;
                    default:      window.location.href = 'index.html'; break;
                }
            }, 800);
        } catch (err) {
            showToast('Email hoặc mật khẩu không đúng!', 'error');
            document.getElementById('loginForm').style.animation = 'shake 0.4s ease';
            setTimeout(() => {
                document.getElementById('loginForm').style.animation = '';
            }, 400);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Đăng nhập';
        }
    }

    /* ── Register ── */
    async function handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;

        if (!name || !email || !password || !confirmPassword) {
            showToast('Vui lòng nhập đầy đủ thông tin!', 'warning');
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showToast('Email không hợp lệ!', 'warning');
            return;
        }
        if (password.length < 8) {
            showToast('Mật khẩu phải có ít nhất 8 ký tự!', 'warning');
            return;
        }
        if (password !== confirmPassword) {
            showToast('Mật khẩu xác nhận không khớp!', 'error');
            return;
        }

        const btn = document.querySelector('#registerForm .auth-btn');
        btn.disabled = true;
        btn.textContent = 'Đang đăng ký...';

        try {
            const result = await signUpAPI(name, email, password, confirmPassword);
            showToast(result || 'Đăng ký thành công!', 'success');
            setTimeout(() => switchTab('login'), 800);
        } catch (err) {
            showToast(err.message || 'Đăng ký thất bại! Email có thể đã được sử dụng.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Đăng ký';
        }
    }

    /* ── Floating vegetable emojis ── */
    function createFloatingVeggies() {
        const container = document.getElementById('floatingVeggies');
        const emojis = ['🥬','🥕','🍎','🍄','🌿','🥦','🍅','🌽','🥒','🍆','🍇','🍊','🥑','🫑','🧅'];
        const count = 18;

        for (let i = 0; i < count; i++) {
            const el = document.createElement('span');
            el.className = 'floating-veggie';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
            el.style.animationDuration = (4 + Math.random() * 8) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.opacity = 0.12 + Math.random() * 0.18;
            container.appendChild(el);
        }
    }

    /* ── Redirect if already logged in ── */
    (function checkAlreadyLoggedIn() {
        const user = getCurrentUser();
        if (user) {
            switch (user.role) {
                case 'admin': window.location.href = 'admin/dashboard.html'; break;
                case 'staff': window.location.href = 'staff/dashboard.html'; break;
                default:      window.location.href = 'index.html'; break;
            }
        }
    })();

    document.addEventListener('DOMContentLoaded', createFloatingVeggies);
</script>

<style>
    .floating-veggies {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }
    .floating-veggie {
        position: absolute;
        animation: floatVeggie 6s ease-in-out infinite alternate;
        pointer-events: none;
        user-select: none;
    }
    @keyframes floatVeggie {
        0%   { transform: translateY(0) rotate(0deg); }
        50%  { transform: translateY(-30px) rotate(15deg); }
        100% { transform: translateY(10px) rotate(-10deg); }
    }
</style>

</body>
</html>

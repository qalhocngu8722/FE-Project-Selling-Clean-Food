<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FreshQAL</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">
    <style>
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        .bar-item .bar {
            height: 0;
        }
        .bar-item .bar.animate {
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .donut-chart {
            animation: donutSpin 1s ease forwards;
        }
        @keyframes donutSpin {
            from { transform: rotate(-90deg); opacity: 0; }
            to { transform: rotate(0deg); opacity: 1; }
        }
        .stat-card {
            animation: fadeInUp 0.5s ease backwards;
        }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .topbar-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-product-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            transition: var(--transition);
        }
        .top-product-row:hover {
            background: rgba(76,175,80,0.04);
        }
        .top-product-rank {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .rank-1 { background: #FFF8E1; color: #F9A825; }
        .rank-2 { background: #F5F5F5; color: #9E9E9E; }
        .rank-3 { background: #FBE9E7; color: #FF7043; }
        .rank-default { background: var(--bg-secondary); color: var(--text-light); }
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="admin-layout" id="app">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div class="topbar">
                <h2>⚙️ Admin Dashboard</h2>
                <div class="topbar-actions">
                    <div class="topbar-date" id="currentDate"></div>
                    <span id="userGreeting"></span>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="charts-row">
                <div class="chart-container">
                    <div class="chart-header">
                        <h3>📈 Doanh thu 7 ngày gần đây</h3>
                    </div>
                    <div class="bar-chart" id="revenueChart"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-header">
                        <h3>📊 Phân bố trạng thái đơn hàng</h3>
                    </div>
                    <div id="orderStatusChart" style="padding:10px 0;"></div>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="data-card">
                    <div class="data-card-header">
                        <h3>🛒 Đơn hàng gần đây</h3>
                        <span class="text-muted" style="font-size:0.85rem;" id="orderCount"></span>
                    </div>
                    <div style="overflow-x:auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Mã ĐH</th>
                                    <th>Khách hàng</th>
                                    <th>Ngày</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th>Thanh toán</th>
                                </tr>
                            </thead>
                            <tbody id="recentOrders"></tbody>
                        </table>
                    </div>
                </div>

                <div class="data-card">
                    <div class="data-card-header">
                        <h3>🏆 Sản phẩm bán chạy</h3>
                        <span class="text-muted" style="font-size:0.85rem;">Top 5</span>
                    </div>
                    <div id="topProducts"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
    (function() {
        const user = requireRole(['admin']);
        if (!user) return;

        document.getElementById('sidebarContainer').innerHTML = renderSidebar('admin', 'dashboard');
        document.getElementById('userGreeting').innerHTML = `👋 <strong>${user.name}</strong>`;

        const now = new Date();
        document.getElementById('currentDate').innerHTML =
            `📅 ${now.toLocaleDateString('vi-VN', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' })}`;

        const products = getProducts();
        const orders = getOrders();
        const users = getUsers();

        const resolvedOrders = orders.filter(o => o.order_status === 'resolve');
        const totalRevenue = resolvedOrders.reduce((sum, o) => sum + o.total_amount, 0);
        const pendingOrders = orders.filter(o => o.order_status === 'pending').length;
        const customerCount = users.filter(u => u.role === 'user').length;

        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card green">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <h4>Tổng sản phẩm</h4>
                    <div class="stat-number">${products.length}</div>
                    <div class="stat-change up">📂 ${new Set(products.map(p => p.category_id)).size} danh mục</div>
                </div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon">🛒</div>
                <div class="stat-info">
                    <h4>Tổng đơn hàng</h4>
                    <div class="stat-number">${orders.length}</div>
                    <div class="stat-change ${pendingOrders > 0 ? 'down' : 'up'}">${pendingOrders > 0 ? '⏳ ' + pendingOrders + ' chờ xử lý' : '✅ Đã xử lý hết'}</div>
                </div>
            </div>
            <div class="stat-card blue">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <h4>Tổng doanh thu</h4>
                    <div class="stat-number">${formatPrice(totalRevenue)}</div>
                    <div class="stat-change up">✅ ${resolvedOrders.length} đơn hoàn thành</div>
                </div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h4>Tổng người dùng</h4>
                    <div class="stat-number">${users.length}</div>
                    <div class="stat-change up">🛍️ ${customerCount} khách hàng</div>
                </div>
            </div>
        `;

        // Revenue chart - last 7 days
        const days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(now);
            d.setDate(d.getDate() - i);
            days.push(d);
        }
        const dayRevenue = days.map(day => {
            const dayStr = day.toISOString().split('T')[0];
            return orders
                .filter(o => o.order_date.split('T')[0] === dayStr && o.order_status === 'resolve')
                .reduce((sum, o) => sum + o.total_amount, 0);
        });
        const maxRevenue = Math.max(...dayRevenue, 1);

        document.getElementById('revenueChart').innerHTML = days.map((day, i) => {
            const pct = (dayRevenue[i] / maxRevenue) * 100;
            const label = day.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            const value = dayRevenue[i] > 0 ? formatPrice(dayRevenue[i]) : '0đ';
            return `
                <div class="bar-item">
                    <div class="bar-value">${value}</div>
                    <div class="bar" data-height="${pct}%" style="height:0;"></div>
                    <div class="bar-label">${label}</div>
                </div>`;
        }).join('');

        requestAnimationFrame(() => {
            setTimeout(() => {
                document.querySelectorAll('#revenueChart .bar').forEach(bar => {
                    bar.classList.add('animate');
                    bar.style.height = bar.dataset.height;
                });
            }, 100);
        });

        // Order status donut chart
        const statusCounts = {
            pending: orders.filter(o => o.order_status === 'pending').length,
            approve: orders.filter(o => o.order_status === 'approve').length,
            resolve: orders.filter(o => o.order_status === 'resolve').length,
            reject: orders.filter(o => o.order_status === 'reject').length
        };
        const totalOrders = orders.length || 1;
        const statusColors = {
            pending: '#F9A825',
            approve: '#1565C0',
            resolve: '#2E7D32',
            reject: '#E53935'
        };
        const statusLabels = {
            pending: 'Chờ xác nhận',
            approve: 'Đã xác nhận',
            resolve: 'Đã giao',
            reject: 'Đã hủy'
        };

        let gradientParts = [];
        let cumulative = 0;
        for (const [status, count] of Object.entries(statusCounts)) {
            if (count === 0) continue;
            const pct = (count / totalOrders) * 100;
            gradientParts.push(`${statusColors[status]} ${cumulative}% ${cumulative + pct}%`);
            cumulative += pct;
        }
        const gradient = gradientParts.length > 0
            ? `conic-gradient(${gradientParts.join(', ')})`
            : 'conic-gradient(#e0e0e0 0% 100%)';

        document.getElementById('orderStatusChart').innerHTML = `
            <div class="donut-chart" style="background:${gradient};">
                <div class="donut-center">
                    <div class="donut-value">${orders.length}</div>
                    <div class="donut-label">Đơn hàng</div>
                </div>
            </div>
            <div class="chart-legend">
                ${Object.entries(statusCounts).map(([status, count]) => `
                    <div class="legend-item">
                        <div class="legend-color" style="background:${statusColors[status]};"></div>
                        <span>${statusLabels[status]}: ${count}</span>
                    </div>
                `).join('')}
            </div>`;

        // Recent orders table - latest 8
        const recentOrders = [...orders].sort((a, b) => new Date(b.order_date) - new Date(a.order_date)).slice(0, 8);
        document.getElementById('orderCount').textContent = `${recentOrders.length} / ${orders.length} đơn`;
        document.getElementById('recentOrders').innerHTML = recentOrders.length
            ? recentOrders.map(o => {
                const customer = getUserById(o.user_id);
                return `<tr>
                    <td><strong>#${o.id}</strong></td>
                    <td>${customer ? customer.name : 'N/A'}</td>
                    <td>${formatDate(o.order_date)}</td>
                    <td class="text-accent fw-bold">${formatPrice(o.total_amount)}</td>
                    <td><span class="order-status status-${o.order_status}">${getOrderStatusText(o.order_status)}</span></td>
                    <td><span class="order-status status-${o.payment_status === 'paid' ? 'resolve' : 'pending'}">${getPaymentStatusText(o.payment_status)}</span></td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="6" class="text-center text-muted" style="padding:30px">Chưa có đơn hàng</td></tr>';

        // Top 5 products by sold quantity
        const productSales = {};
        orders.forEach(o => {
            o.items.forEach(item => {
                productSales[item.product_id] = (productSales[item.product_id] || 0) + item.quantity;
            });
        });
        const topProducts = Object.entries(productSales)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        document.getElementById('topProducts').innerHTML = topProducts.length
            ? topProducts.map((entry, idx) => {
                const p = getProductById(parseInt(entry[0]));
                if (!p) return '';
                const rankClass = idx < 3 ? `rank-${idx + 1}` : 'rank-default';
                const totalSold = entry[1];
                const revenue = totalSold * p.price;
                return `
                <div class="top-product-row" style="${idx < topProducts.length - 1 ? 'border-bottom:1px dashed var(--border);' : ''}">
                    <div class="top-product-rank ${rankClass}">${idx + 1}</div>
                    <div style="width:44px;height:44px;background:var(--primary-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">${p.emoji}</div>
                    <div style="flex:1;">
                        <div style="font-weight:600;">${p.name}</div>
                        <div style="font-size:0.82rem;color:var(--text-light);">Đã bán: ${totalSold} ${p.unit} · Doanh thu: ${formatPrice(revenue)}</div>
                    </div>
                    <div style="font-weight:700;color:var(--accent);">${formatPrice(p.price)}</div>
                </div>`;
            }).join('')
            : '<div class="empty-state" style="padding:40px 20px;"><div class="empty-icon">📊</div><p>Chưa có dữ liệu bán hàng</p></div>';
    })();
    </script>
</body>
</html>

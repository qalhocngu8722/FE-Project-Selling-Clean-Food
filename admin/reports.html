<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo & Thống kê - FreshQAL Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../fontawesome-free-6.6.0-web/css/all.css">
    <style>
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        .bar-item .bar {
            height: 0;
        }
        .bar-item .bar.animate {
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .donut-chart {
            animation: donutSpin 1s ease forwards;
        }
        @keyframes donutSpin {
            from { transform: rotate(-90deg); opacity: 0; }
            to { transform: rotate(0deg); opacity: 1; }
        }
        .stat-card {
            animation: fadeInUp 0.5s ease backwards;
        }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .topbar-filter {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-filter select {
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
            background: white;
        }
        .topbar-filter select:focus {
            border-color: var(--primary);
        }
        .export-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 50px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(46,125,50,0.3);
        }
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(46,125,50,0.4);
        }
        .revenue-chart-container {
            margin-bottom: 28px;
        }
        .category-bar .bar {
            background: linear-gradient(180deg, var(--accent), var(--accent-light)) !important;
        }
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="admin-layout" id="app">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div class="topbar">
                <h2>📈 Báo cáo & Thống kê</h2>
                <div class="topbar-actions">
                    <div class="topbar-filter">
                        <span style="font-size:0.9rem;color:var(--text-secondary);">📅 Thời gian:</span>
                        <select id="dateFilter" onchange="applyFilter()">
                            <option value="today">Hôm nay</option>
                            <option value="7days" selected>7 ngày</option>
                            <option value="30days">30 ngày</option>
                            <option value="all">Tất cả</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="chart-container revenue-chart-container">
                <div class="chart-header">
                    <h3>💰 Biểu đồ doanh thu</h3>
                    <span class="text-muted" style="font-size:0.85rem;" id="chartPeriodLabel"></span>
                </div>
                <div class="bar-chart" id="revenueChart" style="height:280px;"></div>
            </div>

            <div class="charts-row">
                <div class="chart-container">
                    <div class="chart-header">
                        <h3>📊 Phân bố trạng thái đơn hàng</h3>
                    </div>
                    <div id="orderStatusChart" style="padding:10px 0;"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-header">
                        <h3>🏷️ Doanh thu theo danh mục</h3>
                    </div>
                    <div class="bar-chart category-bar" id="categoryChart" style="height:250px;"></div>
                </div>
            </div>

            <div class="data-card">
                <div class="data-card-header">
                    <h3>📋 Chi tiết doanh thu</h3>
                    <button class="export-btn" onclick="exportCSV()">
                        📥 Xuất báo cáo
                    </button>
                </div>
                <div style="overflow-x:auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Ngày</th>
                                <th>Số đơn hàng</th>
                                <th>Doanh thu</th>
                                <th>TB / đơn</th>
                            </tr>
                        </thead>
                        <tbody id="revenueTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script>
    let filteredOrders = [];
    let reportData = [];

    (function() {
        const user = requireRole(['admin']);
        if (!user) return;
        document.getElementById('sidebarContainer').innerHTML = renderSidebar('admin', 'reports');
        applyFilter();
    })();

    function getFilteredOrders(filter) {
        const orders = getOrders();
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];

        switch(filter) {
            case 'today':
                return orders.filter(o => o.order_date.split('T')[0] === todayStr);
            case '7days': {
                const from = new Date(now);
                from.setDate(from.getDate() - 6);
                from.setHours(0,0,0,0);
                return orders.filter(o => new Date(o.order_date) >= from);
            }
            case '30days': {
                const from = new Date(now);
                from.setDate(from.getDate() - 29);
                from.setHours(0,0,0,0);
                return orders.filter(o => new Date(o.order_date) >= from);
            }
            default:
                return orders;
        }
    }

    function applyFilter() {
        const filter = document.getElementById('dateFilter').value;
        filteredOrders = getFilteredOrders(filter);
        const allOrders = getOrders();
        const products = getProducts();
        const categories = getCategories();

        const resolved = filteredOrders.filter(o => o.order_status === 'resolve');
        const totalRevenue = resolved.reduce((s, o) => s + o.total_amount, 0);
        const avgOrder = filteredOrders.length > 0 ? Math.round(totalRevenue / (resolved.length || 1)) : 0;
        const totalProductsSold = filteredOrders.reduce((s, o) =>
            s + o.items.reduce((si, item) => si + item.quantity, 0), 0);

        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card blue">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <h4>Doanh thu</h4>
                    <div class="stat-number">${formatPrice(totalRevenue)}</div>
                    <div class="stat-change up">Từ ${resolved.length} đơn hoàn thành</div>
                </div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon">🛒</div>
                <div class="stat-info">
                    <h4>Số đơn hàng</h4>
                    <div class="stat-number">${filteredOrders.length}</div>
                    <div class="stat-change up">Tổng hệ thống: ${allOrders.length}</div>
                </div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <h4>Giá trị TB / đơn</h4>
                    <div class="stat-number">${formatPrice(avgOrder)}</div>
                    <div class="stat-change up">Trung bình đơn hoàn thành</div>
                </div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <h4>Sản phẩm đã bán</h4>
                    <div class="stat-number">${totalProductsSold}</div>
                    <div class="stat-change up">${products.length} sản phẩm trong kho</div>
                </div>
            </div>
        `;

        renderRevenueChart(filter);
        renderStatusDonut();
        renderCategoryChart(products, categories);
        renderRevenueTable(filter);
    }

    function renderRevenueChart(filter) {
        const now = new Date();
        let days = [];
        let isDaily = true;

        if (filter === 'today') {
            days = [new Date(now)];
        } else if (filter === '7days') {
            for (let i = 6; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                days.push(d);
            }
        } else if (filter === '30days') {
            for (let i = 29; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                days.push(d);
            }
        } else {
            const orderDates = filteredOrders.map(o => o.order_date.split('T')[0]);
            const uniqueDates = [...new Set(orderDates)].sort();
            if (uniqueDates.length <= 31) {
                days = uniqueDates.map(d => new Date(d + 'T00:00:00'));
            } else {
                isDaily = false;
                const months = {};
                filteredOrders.filter(o => o.order_status === 'resolve').forEach(o => {
                    const key = o.order_date.substring(0, 7);
                    months[key] = (months[key] || 0) + o.total_amount;
                });
                const sorted = Object.entries(months).sort((a, b) => a[0].localeCompare(b[0]));
                const maxVal = Math.max(...sorted.map(e => e[1]), 1);
                document.getElementById('chartPeriodLabel').textContent = 'Theo tháng';
                document.getElementById('revenueChart').innerHTML = sorted.map(([month, rev]) => {
                    const pct = (rev / maxVal) * 100;
                    return `<div class="bar-item">
                        <div class="bar-value">${formatPrice(rev)}</div>
                        <div class="bar" data-height="${pct}%" style="height:0;"></div>
                        <div class="bar-label">${month}</div>
                    </div>`;
                }).join('');
                animateBars('#revenueChart');
                return;
            }
        }

        const dayRevenue = days.map(day => {
            const dayStr = day.toISOString().split('T')[0];
            return filteredOrders
                .filter(o => o.order_date.split('T')[0] === dayStr && o.order_status === 'resolve')
                .reduce((sum, o) => sum + o.total_amount, 0);
        });
        const maxRevenue = Math.max(...dayRevenue, 1);

        const periodLabels = { today: 'Hôm nay', '7days': '7 ngày gần đây', '30days': '30 ngày gần đây', all: 'Tất cả' };
        document.getElementById('chartPeriodLabel').textContent = periodLabels[filter] || '';

        document.getElementById('revenueChart').innerHTML = days.map((day, i) => {
            const pct = (dayRevenue[i] / maxRevenue) * 100;
            const label = day.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            const value = dayRevenue[i] > 0 ? formatPrice(dayRevenue[i]) : '0đ';
            return `<div class="bar-item">
                <div class="bar-value">${filter === '30days' && dayRevenue[i] === 0 ? '' : value}</div>
                <div class="bar" data-height="${pct}%" style="height:0;"></div>
                <div class="bar-label">${filter === '30days' && i % 3 !== 0 ? '' : label}</div>
            </div>`;
        }).join('');

        animateBars('#revenueChart');
    }

    function renderStatusDonut() {
        const statusCounts = {
            pending: filteredOrders.filter(o => o.order_status === 'pending').length,
            approve: filteredOrders.filter(o => o.order_status === 'approve').length,
            resolve: filteredOrders.filter(o => o.order_status === 'resolve').length,
            reject: filteredOrders.filter(o => o.order_status === 'reject').length
        };
        const total = filteredOrders.length || 1;
        const colors = { pending: '#F9A825', approve: '#1565C0', resolve: '#2E7D32', reject: '#E53935' };
        const labels = { pending: 'Chờ xác nhận', approve: 'Đã xác nhận', resolve: 'Đã giao', reject: 'Đã hủy' };

        let parts = [];
        let cum = 0;
        for (const [s, c] of Object.entries(statusCounts)) {
            if (c === 0) continue;
            const pct = (c / total) * 100;
            parts.push(`${colors[s]} ${cum}% ${cum + pct}%`);
            cum += pct;
        }
        const grad = parts.length > 0
            ? `conic-gradient(${parts.join(', ')})`
            : 'conic-gradient(#e0e0e0 0% 100%)';

        document.getElementById('orderStatusChart').innerHTML = `
            <div class="donut-chart" style="background:${grad};">
                <div class="donut-center">
                    <div class="donut-value">${filteredOrders.length}</div>
                    <div class="donut-label">Đơn hàng</div>
                </div>
            </div>
            <div class="chart-legend">
                ${Object.entries(statusCounts).map(([s, c]) => `
                    <div class="legend-item">
                        <div class="legend-color" style="background:${colors[s]};"></div>
                        <span>${labels[s]}: ${c} (${total > 0 ? Math.round((c/total)*100) : 0}%)</span>
                    </div>`).join('')}
            </div>`;
    }

    function renderCategoryChart(products, categories) {
        const catRevenue = {};
        filteredOrders.filter(o => o.order_status === 'resolve').forEach(o => {
            o.items.forEach(item => {
                const p = products.find(pr => pr.id === item.product_id);
                if (p) {
                    catRevenue[p.category_id] = (catRevenue[p.category_id] || 0) + item.quantity * item.unit_price;
                }
            });
        });

        const catData = categories.map(c => ({
            name: c.icon + ' ' + c.name,
            revenue: catRevenue[c.id] || 0
        })).sort((a, b) => b.revenue - a.revenue);

        const maxCat = Math.max(...catData.map(c => c.revenue), 1);

        document.getElementById('categoryChart').innerHTML = catData.map(c => {
            const pct = (c.revenue / maxCat) * 100;
            return `<div class="bar-item">
                <div class="bar-value">${c.revenue > 0 ? formatPrice(c.revenue) : '0đ'}</div>
                <div class="bar" data-height="${pct}%" style="height:0;"></div>
                <div class="bar-label">${c.name}</div>
            </div>`;
        }).join('');

        animateBars('#categoryChart');
    }

    function renderRevenueTable(filter) {
        const now = new Date();
        let days = [];

        if (filter === 'today') {
            days = [new Date(now)];
        } else if (filter === '7days') {
            for (let i = 6; i >= 0; i--) {
                const d = new Date(now); d.setDate(d.getDate() - i); days.push(d);
            }
        } else if (filter === '30days') {
            for (let i = 29; i >= 0; i--) {
                const d = new Date(now); d.setDate(d.getDate() - i); days.push(d);
            }
        } else {
            const dates = [...new Set(filteredOrders.map(o => o.order_date.split('T')[0]))].sort().reverse();
            days = dates.map(d => new Date(d + 'T00:00:00'));
        }

        reportData = days.map(day => {
            const dayStr = day.toISOString().split('T')[0];
            const dayOrders = filteredOrders.filter(o => o.order_date.split('T')[0] === dayStr);
            const dayResolved = dayOrders.filter(o => o.order_status === 'resolve');
            const revenue = dayResolved.reduce((s, o) => s + o.total_amount, 0);
            const avg = dayResolved.length > 0 ? Math.round(revenue / dayResolved.length) : 0;
            return { date: dayStr, dateFormatted: formatDate(day.toISOString()), orders: dayOrders.length, revenue, avg };
        });

        const hasData = reportData.some(r => r.orders > 0);

        document.getElementById('revenueTable').innerHTML = hasData
            ? reportData.filter(r => r.orders > 0 || filter === '7days' || filter === 'today').map(r => `
                <tr>
                    <td><strong>${r.dateFormatted}</strong></td>
                    <td>${r.orders}</td>
                    <td class="text-accent fw-bold">${formatPrice(r.revenue)}</td>
                    <td>${r.avg > 0 ? formatPrice(r.avg) : '-'}</td>
                </tr>`).join('')
            : '<tr><td colspan="4" class="text-center text-muted" style="padding:30px">Không có dữ liệu trong khoảng thời gian này</td></tr>';
    }

    function animateBars(selector) {
        requestAnimationFrame(() => {
            setTimeout(() => {
                document.querySelectorAll(`${selector} .bar`).forEach(bar => {
                    bar.classList.add('animate');
                    bar.style.height = bar.dataset.height;
                });
            }, 100);
        });
    }

    function exportCSV() {
        if (!reportData || reportData.length === 0) {
            showToast('Không có dữ liệu để xuất!', 'warning');
            return;
        }

        const BOM = '\uFEFF';
        const headers = ['Ngày', 'Số đơn hàng', 'Doanh thu (VNĐ)', 'TB/đơn (VNĐ)'];
        const rows = reportData
            .filter(r => r.orders > 0)
            .map(r => [r.dateFormatted, r.orders, r.revenue, r.avg]);

        if (rows.length === 0) {
            showToast('Không có dữ liệu để xuất!', 'warning');
            return;
        }

        const totalRevenue = rows.reduce((s, r) => s + r[2], 0);
        const totalOrders = rows.reduce((s, r) => s + r[1], 0);
        rows.push(['TỔNG CỘNG', totalOrders, totalRevenue, totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0]);

        const csvContent = BOM + [headers, ...rows].map(row => row.join(',')).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        const filter = document.getElementById('dateFilter').value;
        const filterLabels = { today: 'hom-nay', '7days': '7-ngay', '30days': '30-ngay', all: 'tat-ca' };
        link.download = `bao-cao-doanh-thu-${filterLabels[filter]}-${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast('Đã xuất báo cáo CSV thành công!', 'success');
    }
    </script>
</body>
</html>
